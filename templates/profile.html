{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h3 class="mb-4">My Profile</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       class="form-control"
                       name="name"
                       value="{{ employee.name }}"
                       required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       class="form-control"
                       value="{{ employee.email }}"
                       readonly>
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       class="form-control"
                       name="phone"
                       value="{{ employee.phone }}"
                       required>
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text"
                       class="form-control"
                       name="department"
                       value="{{ employee.department }}"
                       required>
            </div>

            <div class="mb-3">
                <label>Designation</label>
                <input type="text"
                       class="form-control"
                       name="designation"
                       value="{{ employee.designation }}"
                       required>
            </div>

            <button class="btn btn-primary">
                Update Profile
            </button>

        </form>

    </div>

</div>

{% endblock %}
